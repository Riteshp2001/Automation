name: Trigger Vercel Cron Endpoint

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"
      timezone: "Asia/Kolkata"

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call deployed cron endpoint
        env:
          CRON_ENDPOINT_URL: ${{ secrets.CRON_ENDPOINT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_ENDPOINT_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_ENDPOINT_URL or CRON_SECRET GitHub secret."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_ENDPOINT_URL")"

          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo
            echo "Cron endpoint failed with status $status_code"
            exit 1
          fi
