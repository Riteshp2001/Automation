name: Trigger Vercel Cron Endpoint

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4,9,14,18,23 * * *"

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call deployed cron endpoint
        env:
          CRON_ENDPOINT_URL: ${{ secrets.CRON_ENDPOINT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          node <<'EOF'
          const endpoint = (process.env.CRON_ENDPOINT_URL || "").trim();
          const secret = (process.env.CRON_SECRET || "").trim();

          if (!endpoint || !secret) {
            console.error("Missing CRON_ENDPOINT_URL or CRON_SECRET GitHub secret.");
            process.exit(1);
          }

          (async () => {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${secret}`
              }
            });

            const body = await response.text();
            process.stdout.write(body);
            process.stdout.write("\n");

            if (!response.ok) {
              console.error(`Cron endpoint failed with status ${response.status}`);
              process.exit(1);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
