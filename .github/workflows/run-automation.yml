name: Run Automation

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force a post immediately
        required: false
        default: "false"
  schedule:
    # Runs every hour at the start of the hour
    - cron: "0 * * * *"

concurrency:
  group: run-automation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-next-reel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if we should run today
        id: scheduler
        run: |
          # Use the date (YYYY-MM-DD) as a seed for the random generator
          # This ensures the two "random" hours remain the same for the entire day
          SEED=$(date +%F | tr -d '-')
          
          # Derive two deterministic hours from the daily seed.
          HASH=$(printf '%s' "$SEED" | sha256sum | cut -c1-8)
          HOUR_ONE=$((16#${HASH:0:2} % 24))
          HOUR_TWO=$((16#${HASH:2:2} % 24))

          if [ "$HOUR_TWO" -eq "$HOUR_ONE" ]; then
            HOUR_TWO=$(( (HOUR_ONE + 12) % 24 ))
          fi

          RANDOM_HOURS="$HOUR_ONE $HOUR_TWO"
          CURRENT_HOUR=$((10#$(date +%H)))
          
          echo "Today's scheduled hours: $RANDOM_HOURS"
          echo "Current hour: $CURRENT_HOUR"
          
          SHOULD_RUN="false"
          for HOUR in $RANDOM_HOURS; do
            if [ "$CURRENT_HOUR" -eq "$HOUR" ]; then
              SHOULD_RUN="true"
            fi
          done

          # If it's a manual dispatch (force), always run
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
             SHOULD_RUN="true"
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.scheduler.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.scheduler.outputs.should_run == 'true'
        run: npm ci

      - name: Run the next scheduled upload
        if: steps.scheduler.outputs.should_run == 'true'
        env:
          # ... (All your existing env variables)
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_SOURCE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_SOURCE_FOLDER_ID }}
          GOOGLE_DRIVE_CONFIG_FILE_NAME: ${{ secrets.GOOGLE_DRIVE_CONFIG_FILE_NAME }}
          INSTAGRAM_AUTH_MODE: ${{ secrets.INSTAGRAM_AUTH_MODE }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_BASE_URL: ${{ secrets.GROQ_BASE_URL }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          DEFAULT_CAPTION_MODE: ${{ secrets.DEFAULT_CAPTION_MODE }}
          DEFAULT_TIMEZONE: ${{ secrets.DEFAULT_TIMEZONE }}
          DEFAULT_SCHEDULE_CRON: ${{ secrets.DEFAULT_SCHEDULE_CRON }}
          ENABLE_UPLOADS: "true"
          PUBLIC_MEDIA_PROVIDER: github-release
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MEDIA_REPOSITORY: ${{ github.repository }}
          GITHUB_MEDIA_RELEASE_TAG: automation-media
          GITHUB_MEDIA_RELEASE_NAME: Automation Media
          GITHUB_MEDIA_ASSET_PREFIX: automation-media
          MAX_UPLOAD_RETRIES: ${{ secrets.MAX_UPLOAD_RETRIES }}
          MAX_VIDEO_SIZE_MB: ${{ secrets.MAX_VIDEO_SIZE_MB }}
          STATUS_POLL_ATTEMPTS: ${{ secrets.STATUS_POLL_ATTEMPTS }}
          STATUS_POLL_INTERVAL_MS: ${{ secrets.STATUS_POLL_INTERVAL_MS }}
          GROQ_TIMEOUT_MS: ${{ secrets.GROQ_TIMEOUT_MS }}
          POSTING_STATE_BACKEND: local-file
          POSTING_STATE_FILE_PATH: .automation/posting-state.json
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [ "$FORCE_RUN" = "true" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            npm run run -- --force
          else
            npm run run
          fi

      - name: Commit posting state
        if: steps.scheduler.outputs.should_run == 'true'
        run: |
          if [ -z "$(git status --porcelain -- .automation/posting-state.json)" ]; then
            echo "No posting state changes to commit."
            exit 0
          fi

          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          REMOTE_STATE_FILE="$(mktemp)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH_NAME"

          if git cat-file -e "origin/$BRANCH_NAME:.automation/posting-state.json" 2>/dev/null; then
            git show "origin/$BRANCH_NAME:.automation/posting-state.json" > "$REMOTE_STATE_FILE"
            node - "$REMOTE_STATE_FILE" ".automation/posting-state.json" <<'EOF'
            const fs = require("fs");
            
            const [remotePath, localPath] = process.argv.slice(2);
            
            function readState(path) {
              try {
                const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
                return {
                  postedFileIds: Array.isArray(parsed.postedFileIds) ? parsed.postedFileIds.map(String) : [],
                  history: Array.isArray(parsed.history) ? parsed.history : []
                };
              } catch {
                return {
                  postedFileIds: [],
                  history: []
                };
              }
            }
            
            function normalizeHistoryEntry(entry) {
              return {
                ...entry,
                fileId: entry && entry.fileId != null ? String(entry.fileId) : undefined,
                uploadFileId: entry && entry.uploadFileId != null ? String(entry.uploadFileId) : undefined,
                instagramMediaId:
                  entry && entry.instagramMediaId != null ? String(entry.instagramMediaId) : undefined
              };
            }
            
            const remoteState = readState(remotePath);
            const localState = readState(localPath);
            const history = [];
            const seenHistoryEntries = new Set();
            
            for (const entry of [...remoteState.history, ...localState.history]) {
              const normalizedEntry = normalizeHistoryEntry(entry);
              const key = JSON.stringify([
                normalizedEntry.fileId || "",
                normalizedEntry.uploadFileId || "",
                normalizedEntry.postedAt || "",
                normalizedEntry.instagramMediaId || "",
                normalizedEntry.name || ""
              ]);
            
              if (!seenHistoryEntries.has(key)) {
                seenHistoryEntries.add(key);
                history.push(normalizedEntry);
              }
            }
            
            history.sort((left, right) =>
              String(left.postedAt || "").localeCompare(String(right.postedAt || ""))
            );
            
            const mergedState = {
              postedFileIds: [...new Set([...remoteState.postedFileIds, ...localState.postedFileIds])],
              history
            };
            
            fs.writeFileSync(localPath, `${JSON.stringify(mergedState, null, 2)}\n`);
            EOF
          fi

          git add .automation/posting-state.json
          if git diff --cached --quiet; then
            echo "Posting state is already up to date."
            exit 0
          fi

          git commit -m "Update automation posting state"
          git fetch origin "$BRANCH_NAME"
          git rebase "origin/$BRANCH_NAME"
          git push origin HEAD:"$BRANCH_NAME"
